name: Build Mobile and Desktop Apps

on:
  push:
    branches: [ "main" ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.8.0'
        target: 'desktop'
    - name: Build
      run: |
        mkdir build && cd build
        qt-cmake ..
        cmake --build .

  build-android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'
    - name: Install Qt for Android
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.8.0'
        target: 'android'
    - name: Build APK
      run: |
        sudo apt-get update && sudo apt-get install -y ninja-build
        mkdir build && cd build
        qt-cmake -DQT_ANDROID_ABIS=arm64-v8a ..
        cmake --build .

  build-ios:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Qt for iOS
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.8.0'
        target: 'ios'
    - name: Build unsigned IPA
      run: |
        mkdir build && cd build
        qt-cmake -G Xcode -DCMAKE_SYSTEM_NAME=iOS -DCMAKE_OSX_ARCHITECTURES="arm64" ..
        cmake --build . --config Release
        mkdir -p Payload
        cp -r Release-iphoneos/*.app Payload/ 2>/dev/null || cp -r Release/*.app Payload/
        zip -r AgildoFinancasApp.ipa Payload
