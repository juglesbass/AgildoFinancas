name: Compilar Agildo Financas

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Gerar IPA para AltStore
    runs-on: macos-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4
      
      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Instalar dependências
        run: flutter pub get
        
      - name: Compilar Dart e Preparar Projeto (Ignora erro)
        run: flutter build ios --release --no-codesign || true
        
      - name: Forçar Compilação do App (Bypass Xcode)
        run: |
          cd ios
          xcodebuild build -workspace Runner.xcworkspace -scheme Runner -configuration Release -sdk iphoneos -arch arm64 CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" SYMROOT="$(PWD)/../build/ios"
        
      - name: Empacotar para AltStore (.ipa)
        run: |
          mkdir -p Payload
          mv build/ios/Release-iphoneos/Runner.app Payload/
          zip -r AgildoFinancas.ipa Payload
          
      - name: Disponibilizar arquivo IPA
        uses: actions/upload-artifact@v4
        with:
          name: AgildoFinancas-iOS
          path: AgildoFinancas.ipa

  build-android:
    name: Gerar APK Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - run: flutter pub get
      - run: flutter build apk --release
      
      - uses: actions/upload-artifact@v4
        with:
          name: AgildoFinancas-Android
          path: build/app/outputs/flutter-apk/app-release.apk
