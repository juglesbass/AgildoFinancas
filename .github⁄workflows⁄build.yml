name: Build Mobile App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Permite rodar manualmente no GitHub

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Instalar Qt para Android
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.3'
          target: 'android'
          arch: 'android_arm64_v8a'

      - name: Build do APK
        run: |
          mkdir build && cd build
          cmake -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake -DANDROID_ABI=arm64-v8a ..
          make
          make apk

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: AgildoFinancas-Android
          path: build/*_build_apk/*.apk

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      - name: Instalar Qt para iOS
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.3'
          target: 'ios'

      - name: Build do App iOS
        run: |
          mkdir build && cd build
          cmake -G Xcode -DCMAKE_SYSTEM_NAME=iOS -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 ..
          xcodebuild -project AgildoFinancas.xcodeproj -scheme AgildoFinancas -configuration Release CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

      - name: Empacotar para AltStore (.ipa)
        run: |
          cd build/Release-iphoneos
          mkdir Payload
          mv AgildoFinancas.app Payload/
          zip -r AgildoFinancas.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v3
        with:
          name: AgildoFinancas-iOS
          path: build/Release-iphoneos/AgildoFinancas.ipa
